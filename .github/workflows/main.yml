name: build_tweak

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  THEOS: /opt/theos

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Theos
        run: |
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          sudo rm -rf ${{ env.THEOS }}
          sudo git clone --recursive https://github.com/theos/theos.git ${{ env.THEOS }}
          sudo chown -R $(id -u):$(id -g) ${{ env.THEOS }}
          # O'zgaruvchilarni tizimga doimiy yozish
          echo "THEOS=${{ env.THEOS }}" >> $GITHUB_ENV
          echo "${{ env.THEOS }}/bin" >> $GITHUB_PATH

      - name: Setup SDK
        run: |
          rm -rf ${{ env.THEOS }}/sdks
          git clone https://github.com/theos/sdks.git ${{ env.THEOS }}/sdks

      - name: Build Tweak
        run: |
          # Makefile va Tweak.x orqali yig'ish
          make clean
          make package FINALPACKAGE=1
        env:
          THEOS_DEVICE_IP: ""

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PUBG-Weapon-Tweak-Package
          path: packages/*.deb
