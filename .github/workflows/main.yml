name: build_tweak

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Theos
        run: |
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          sudo rm -rf /opt/theos
          sudo git clone --recursive https://github.com/theos/theos.git /opt/theos
          sudo chown -R $(id -u):$(id -g) /opt/theos
          # O'zgaruvchilarni butun tizimga tanitish
          echo "THEOS=/opt/theos" >> $GITHUB_ENV
          echo "/opt/theos/bin" >> $GITHUB_PATH

      - name: Setup SDK
        run: |
          # SDK yuklashda xatolik bo'lmasligi uchun rm -rf ishlatamiz
          rm -rf /opt/theos/sdks
          git clone https://github.com/theos/sdks.git /opt/theos/sdks

      - name: Build Tweak
        run: |
          # Makefile ichidagi Tweak.x fayli mavjudligini Actions ko'rishi shart
          make clean
          make package FINALPACKAGE=1
        env:
          THEOS_DEVICE_IP: ""

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PUBG-Weapon-Tweak-Package
          path: packages/*.deb
